services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pgsql_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    

  pgadmin:
    image: dpage/pgadmin4:9
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_HOST_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pgsql_network

  nocodb:
    image: nocodb/nocodb:0.301.5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_SSRF_ALLOWED_DOMAINS: "postgres,pgadmin"
      NC_ALLOW_LOCAL_EXTERNAL_DBS: "true"
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER:-postgres}&p=${POSTGRES_PASSWORD}&d=${NC_DB_NAME:-nocodb_db}"
      NC_PUBLIC_URL: ${NC_PUBLIC_URL:-http://localhost:${NOCODB_HOST_PORT:-8999}}
    ports:
      - "${NOCODB_HOST_PORT:-8999}:8080"
    volumes:
      - nocodb_data:/usr/app/data
    networks:
      - pgsql_network

volumes:
  postgres_data:
  pgadmin_data:
  nocodb_data:

networks:
  pgsql_network:
    driver: bridge 
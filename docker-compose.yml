services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pgsql_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    

  pgadmin:
    image: dpage/pgadmin4:9
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_HOST_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pgsql_network

  nocodb:
    image: nocodb/nocodb:0.301.4
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_SSRF_ALLOWED_DOMAINS: "postgres,pgadmin"
      NC_ALLOW_LOCAL_EXTERNAL_DBS: "true"
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER:-postgres}&p=${POSTGRES_PASSWORD}&d=${NC_DB_NAME:-nocodb_db}"
      NC_PUBLIC_URL: ${NC_PUBLIC_URL:-http://localhost:${NOCODB_HOST_PORT:-8999}}
    ports:
      - "${NOCODB_HOST_PORT:-8999}:8080"
    volumes:
      - nocodb_data:/usr/app/data
    networks:
      - pgsql_network

  baserow:
    image: baserow/baserow:2.2.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BASEROW_PUBLIC_URL: ${BASEROW_PUBLIC_URL:-http://localhost:${BASEROW_HOST_PORT:-8085}}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${BASEROW_DB_NAME:-${POSTGRES_DB:-postgres}}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      BASEROW_CADDY_ADDRESSES: ${BASEROW_CADDY_ADDRESSES:-:80}
    ports:
      - "${BASEROW_HOST_PORT:-8085}:80"
    volumes:
      - baserow_data:/baserow/data
    networks:
      - pgsql_network

  mathesar:
    image: mathesar/mathesar:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      ALLOWED_HOSTS: ${MATHESAR_ALLOWED_HOSTS:-*}
      DEBUG: ${MATHESAR_DEBUG:-false}
      SECRET_KEY: ${MATHESAR_SECRET_KEY-}
      WEB_CONCURRENCY: ${MATHESAR_WEB_CONCURRENCY:-3}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${MATHESAR_DB_NAME:-${POSTGRES_DB:-postgres}}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${MATHESAR_HOST_PORT:-9080}:8000"
    volumes:
      - mathesar_media:/code/.media
      - mathesar_static:/code/static
      - mathesar_secrets:/code/.secrets
    networks:
      - pgsql_network

networks:
  pgsql_network:
    driver: bridge 

volumes:
  postgres_data:
  nocodb_data:
  baserow_data:
  pgadmin_data:
  mathesar_media:
  mathesar_static:
  mathesar_secrets: